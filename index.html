<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief — Fairfield, CT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,'Times New Roman',Times,serif;background:#fff;color:#111;max-width:600px;margin:0 auto;padding:8px;}
.head{text-align:center;padding:12px 8px 8px;border-bottom:3px double #111;}
.head-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-family:Arial,sans-serif;color:#555;margin-bottom:3px;}
.head-date{font-size:22px;font-weight:700;line-height:1.1;}
.head-time{font-size:12px;color:#555;font-family:Arial,sans-serif;margin-top:3px;}
.body{display:table;width:100%;border-collapse:collapse;}
.col{display:table-cell;width:50%;padding:10px;vertical-align:top;}
.col-left{border-right:1px solid #ccc;}
.sec-head{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-family:Arial,sans-serif;color:#555;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:8px;}
.weather-temp{font-size:38px;font-weight:700;line-height:1;}
.weather-desc{font-size:13px;color:#333;font-family:Arial,sans-serif;margin-top:3px;}
.weather-detail{font-size:11px;color:#777;font-family:Arial,sans-serif;margin-top:4px;}
.quote-text{font-style:italic;font-size:12px;line-height:1.5;border-left:2px solid #111;padding-left:8px;margin-bottom:5px;}
.quote-attr{font-size:10px;color:#555;font-family:Arial,sans-serif;}
.stock-row{display:table;width:100%;font-size:12px;margin-bottom:5px;font-family:Arial,sans-serif;}
.stock-sym{display:table-cell;font-weight:700;}
.stock-price{display:table-cell;text-align:center;}
.stock-chg{display:table-cell;text-align:right;}
.up{color:#1a5c1a;}.dn{color:#8b0000;}
.news-item{border-bottom:1px solid #ddd;padding:6px 0;}
.news-item:last-child{border-bottom:none;}
.news-source{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#777;font-family:Arial,sans-serif;margin-bottom:2px;}
.news-hed{font-size:12px;font-weight:700;line-height:1.3;}
.footer{border-top:3px double #111;padding:5px 8px;text-align:center;font-size:9px;font-family:Arial,sans-serif;color:#777;letter-spacing:.1em;text-transform:uppercase;margin-top:0;}
.spacer{height:10px;}
.loading{font-size:12px;color:#777;font-family:Arial,sans-serif;}
.err{font-size:11px;color:#8b0000;font-family:Arial,sans-serif;}
</style>
</head>
<body>

<div class="head">
  <div class="head-label">Morning Brief &mdash; Fairfield, CT</div>
  <div class="head-date" id="hdate"></div>
  <div class="head-time" id="htime"></div>
</div>

<div class="body">
  <div class="col col-left">
    <div class="sec-head">Weather</div>
    <div class="weather-temp" id="w-temp">&mdash;</div>
    <div class="weather-desc" id="w-desc"><span class="loading">Loading...</span></div>
    <div class="weather-detail" id="w-detail"></div>
    <div class="spacer"></div>
    <div class="sec-head">Quote of the Day</div>
    <div class="quote-text" id="q-text"><span class="loading">Loading...</span></div>
    <div class="quote-attr" id="q-attr"></div>
    <div class="spacer"></div>
    <div class="sec-head">Markets</div>
    <div id="stocks"><div class="loading">Loading...</div></div>
  </div>
  <div class="col col-right">
    <div class="sec-head">Headlines</div>
    <div id="news"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="footer">Refreshes on each page load &bull; Fairfield, CT</div>

<script>
/* ── PASTE YOUR GNEWS KEY BETWEEN THE QUOTES BELOW ── */
var NEWSDATA_KEY = 'pub_42049543cd3c4f4abfb029c3e4efe538';

/* ── WMO weather codes ── */
var WMO={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Thunderstorm w/ heavy hail'};

/* ── Rotating quotes (no API needed) ── */
var QUOTES=[
  {q:'The secret of getting ahead is getting started.',a:'Mark Twain'},
  {q:'It does not matter how slowly you go as long as you do not stop.',a:'Confucius'},
  {q:'Life is what happens when you\'re busy making other plans.',a:'John Lennon'},
  {q:'The way to get started is to quit talking and begin doing.',a:'Walt Disney'},
  {q:'In the middle of every difficulty lies opportunity.',a:'Albert Einstein'},
  {q:'It always seems impossible until it\'s done.',a:'Nelson Mandela'},
  {q:'Do one thing every day that scares you.',a:'Eleanor Roosevelt'},
  {q:'Well done is better than well said.',a:'Benjamin Franklin'},
  {q:'The best time to plant a tree was 20 years ago. The second best time is now.',a:'Chinese Proverb'},
  {q:'An unexamined life is not worth living.',a:'Socrates'},
  {q:'Spread love everywhere you go.',a:'Mother Teresa'},
  {q:'When you reach the end of your rope, tie a knot in it and hang on.',a:'Franklin D. Roosevelt'},
  {q:'Always remember that you are absolutely unique. Just like everyone else.',a:'Margaret Mead'},
  {q:'Do not go where the path may lead, go instead where there is no path and leave a trail.',a:'Ralph Waldo Emerson'},
  {q:'You will face many defeats in life, but never let yourself be defeated.',a:'Maya Angelou'},
  {q:'The greatest glory in living lies not in never falling, but in rising every time we fall.',a:'Nelson Mandela'},
  {q:'In the end, it\'s not the years in your life that count. It\'s the life in your years.',a:'Abraham Lincoln'},
  {q:'Never let the fear of striking out keep you from playing the game.',a:'Babe Ruth'},
  {q:'Life is either a daring adventure or nothing at all.',a:'Helen Keller'},
  {q:'You have brains in your head. You have feet in your shoes. You can steer yourself any direction you choose.',a:'Dr. Seuss'},
  {q:'If life were predictable it would cease to be life and be without flavor.',a:'Eleanor Roosevelt'},
  {q:'If you look at what you have in life, you\'ll always have more.',a:'Oprah Winfrey'},
  {q:'If you want to live a happy life, tie it to a goal, not to people or things.',a:'Albert Einstein'},
  {q:'Never let the fear of striking out keep you from playing the game.',a:'Babe Ruth'},
  {q:'Money and success don\'t change people; they merely amplify what is already there.',a:'Will Smith'},
  {q:'Your time is limited, so don\'t waste it living someone else\'s life.',a:'Steve Jobs'},
  {q:'Not how long, but how well you have lived is the main thing.',a:'Seneca'},
  {q:'If life were predictable it would cease to be life.',a:'Eleanor Roosevelt'},
  {q:'The whole secret of a successful life is to find out what is one\'s destiny to do, and then do it.',a:'Henry Ford'},
  {q:'Success is not final; failure is not fatal: It is the courage to continue that counts.',a:'Winston Churchill'}
];

/* ── Clock ── */
function setClocks(){
  var now=new Date();
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var h=now.getHours(),m=now.getMinutes();
  var ampm=h>=12?'PM':'AM';
  var h12=h%12||12;
  var ts=h12+':'+(m<10?'0':'')+m+' '+ampm;
  var ds=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  document.getElementById('hdate').innerHTML=ds;
  document.getElementById('htime').innerHTML=ts;
}
setClocks();

/* ── Helpers ── */
function chgClass(v){return v>=0?'up':'dn';}
function chgStr(v){return(v>=0?'+':'')+v.toFixed(2)+'%';}
function getJSON(url,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      try{cb(null,JSON.parse(xhr.responseText));}
      catch(e){cb(e,null);}
    }
  };
  xhr.onerror=function(){cb(new Error('net'),null);};
  xhr.send();
}

/* ── Weather (Open-Meteo, free, no key) ── */
function loadWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude=41.1409&longitude=-73.2618&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York';
  getJSON(url,function(err,data){
    if(err||!data||!data.current){
      document.getElementById('w-desc').innerHTML='<span class="err">Weather unavailable</span>';
      return;
    }
    var c=data.current;
    document.getElementById('w-temp').innerHTML=Math.round(c.temperature_2m)+'&deg;F';
    document.getElementById('w-desc').textContent=WMO[c.weather_code]||'Unknown';
    document.getElementById('w-detail').textContent='Humidity '+c.relative_humidity_2m+'% \u00b7 Wind '+Math.round(c.wind_speed_10m)+' mph';
  });
}

/* ── Quote (local rotating list, no API) ── */
function loadQuote(){
  var today=new Date();
  var idx=(today.getFullYear()*366+today.getMonth()*31+today.getDate())%QUOTES.length;
  var q=QUOTES[idx];
  document.getElementById('q-text').textContent='\u201c'+q.q+'\u201d';
  document.getElementById('q-attr').textContent='\u2014 '+q.a;
}

/* ── Stocks (Frankfurter for forex as proxy check + direct Yahoo) ── */
/* Using a reliable CORS proxy: corsproxy.io */
var TICKERS=['SPY','QQQ','BTC-USD','^DJI'];
var LABELS=['SPY','QQQ','BTC','DJI'];
var loaded={};
var done=0;

function renderStocks(){
  var el=document.getElementById('stocks');
  var html='';
  var count=0;
  for(var i=0;i<LABELS.length;i++){
    var sym=LABELS[i];
    var d=loaded[sym];
    if(!d)continue;
    count++;
    var price=d.price>1000?d.price.toLocaleString(undefined,{maximumFractionDigits:0}):d.price.toFixed(2);
    html+='<div class="stock-row"><span class="stock-sym">'+sym+'</span><span class="stock-price">'+price+'</span><span class="stock-chg '+chgClass(d.chg)+'">'+chgStr(d.chg)+'</span></div>';
  }
  el.innerHTML=count>0?html:'<span class="err">Markets unavailable</span>';
}

function loadTicker(ticker,label){
  var yurl='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(ticker)+'?interval=1d&range=1d';
  var url='https://corsproxy.io/?'+encodeURIComponent(yurl);
  getJSON(url,function(err,data){
    done++;
    try{
      var meta=data.chart.result[0].meta;
      var price=meta.regularMarketPrice;
      var prev=meta.chartPreviousClose||meta.previousClose;
      var chg=prev?((price-prev)/prev*100):0;
      loaded[label]={price:price,chg:chg};
    }catch(e){loaded[label]=null;}
    if(done===TICKERS.length)renderStocks();
  });
}

function loadStocks(){
  for(var i=0;i<TICKERS.length;i++){loadTicker(TICKERS[i],LABELS[i]);}
}

/* ── News (NewsData.io) ── */
function loadNews(){
  var url='https://newsdata.io/api/1/news?apikey='+NEWSDATA_KEY+'&country=us&language=en&size=5';
  getJSON(url,function(err,data){
    if(err||!data||!data.results||!data.results.length){
      document.getElementById('news').innerHTML='<span class="err">Headlines unavailable. Try refreshing in a moment.</span>';
      return;
    }
    var html='';
    var arts=data.results.slice(0,5);
    for(var i=0;i<arts.length;i++){
      var a=arts[i];
      var src=a.source_id||a.source_name||'';
      var title=a.title||'';
      if(title.length>80)title=title.substring(0,80)+'...';
      html+='<div class="news-item"><div class="news-source">'+src+'</div><div class="news-hed">'+title+'</div></div>';
    }
    document.getElementById('news').innerHTML=html;
  });
}

loadWeather();
loadQuote();
loadStocks();
loadNews();
</script>
</body>
</html>
